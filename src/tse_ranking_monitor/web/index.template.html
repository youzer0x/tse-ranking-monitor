<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">

{{APP_CSS}}

<body>
<div class="header"><div class="header-inner">

    <a class="tab" href="https://youzer0x.github.io/pts-ranking-monitor/">PTS 夜間 値上がり率ランキング</a>
  </nav>
  <div class="date-selector"><label for="dateSelect">セッション日:</label>

</div></div>
<div id="viewRanking">
<div class="summary" id="summary"></div>
<div class="container">
  <div class="card">

  </div>
<div class="container" style="margin-top:0;"><div id="droppedArea"></div></div>
</div>
</div>

<dialog id="infoModal" class="info" onclick="closeInfoOnBackdrop(event)">
  <div class="info-head"><h2>データ情報</h2>
    <button class="info-close" onclick="document.getElementById('infoModal').close()" aria-label="閉じる">×</button></div>
  <div class="info-body" id="infoBody"></div>
</dialog>
<script>
{{APP_JS}}
</script>
</body></html>
