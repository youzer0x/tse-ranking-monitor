name: Tests

# コードを触った push のときだけ回す。docs/data/ への日次コミット（Claude ルーチンの
# 自動更新）や README だけの変更では走らないので、Actions 消費と通知ノイズが出ない。
on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # ローカル 3.12.x と一致
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest
