name: Tests

# 実装・テスト・vendor・運用契約を触ったpushだけで回す。docs/data/の日次更新では走らない。
on:
  push:
    paths:
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "vendor/**"
      - "runbook/**"
      - "specs/**"
      - ".claude/agents/tse-factor-batch-researcher.md"
      - ".claude/hooks/runtime_telemetry.py"
      - ".claude/settings.json"
      - "docs/data/*_email.html"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # ローカル 3.12.x と一致
      - run: python -m pip install -r requirements-dev.txt
      - run: test ! -d setup && test ! -d docs/tmp  # 旧配置・公開ルート内一時物の再混入を拒否
      - run: test -z "$(find docs/data -maxdepth 1 -name '*_email.html' -print -quit)"
      - run: python scripts/check_vendor.py   # market-scripts-common ベンダリングのドリフト検知
      - run: python tools/check_methodology_vendor.py  # 方法論スナップショットのcommit/hash検証
      - run: python tools/runtime_contract.py check --contract runbook/runtime_contract.lock.json
      - run: python -m pytest
